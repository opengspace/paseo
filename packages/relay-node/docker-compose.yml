services:
  relay-node:
    build: .
    image: paseo-relay-node:latest
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: "8080"
      LOG_LEVEL: info
      MAX_PENDING_FRAMES: "200"
    ports:
      - "8080:8080"
    # relay-node speaks plain ws — terminate TLS with a reverse proxy in front:
    #
    #   nginx: proxy_pass http://127.0.0.1:8080;  (set Upgrade/Connection headers)
    #   caddy: reverse_proxy relay-node:8080      (auto WebSocket + auto HTTPS)
    #
    # Then point your daemon/app relay endpoint at the public wss:// address.
